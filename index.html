<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Primera Página Web</title>
    <style>
        /* Aquí va el diseño (CSS) */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #3333aa;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>¡Hola Mundo! Mi primera página web</h1>
    <p>Estoy aprendiendo a programar paso a paso.</p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Image_created_with_a_mobile_phone.png/1200px-Image_created_with_a_mobile_phone.png" alt="Mi primera imagen" width="300">

    
    <button onclick="saludar()">¡Haz clic aquí!</button>

    <script>
        /* Aquí va la interactividad (JavaScript) */
        function saludar() {
            alert("¡Felicidades! Acabas de ejecutar tu primer código en JavaScript.");
        }
    </script>

</body>
</html>
